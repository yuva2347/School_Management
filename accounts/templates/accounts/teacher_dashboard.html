<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Teacher Dashboard</title>
    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 40px;
            color: #fff;
        }

        .dashboard-container {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            border-radius: 12px;
            padding: 30px;
            width: 90%;
            max-width: 900px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .top-bar {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 20px;
        }

        .login-btn {
            display: inline-block;
            padding: 10px 16px;
            border-radius: 8px;
            text-decoration: none;
            background: linear-gradient(135deg, #00c6ff, #0072ff);
            color: #fff;
            font-weight: bold;
            transition: transform 0.2s ease, background 0.3s ease;
        }

        .login-btn:hover {
            transform: scale(1.05);
            background: linear-gradient(135deg, #0072ff, #00c6ff);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 30px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            overflow: hidden;
        }

        th, td {
            padding: 12px;
            text-align: center;
        }

        th {
            background: rgba(255, 255, 255, 0.2);
            font-weight: 600;
        }

        tr:nth-child(even) {
            background: rgba(255, 255, 255, 0.05);
        }

        td a {
            display: inline-block;
            margin: 0 5px;
            padding: 8px 14px;
            border-radius: 6px;
            text-decoration: none;
            background: linear-gradient(135deg, #00c6ff, #0072ff);
            color: #fff;
            font-size: 13px;
            font-weight: bold;
            transition: transform 0.2s ease, background 0.3s ease;
        }

        td a:hover {
            transform: scale(1.05);
            background: linear-gradient(135deg, #0072ff, #00c6ff);
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <div class="top-bar">
            <a href="{% url 'login' %}" class="login-btn">Logout</a>
        </div>
        <h2>Teacher Dashboard</h2>
        <table>
            <tr>
                <th>Student ID</th>
                <th>Name</th>
                <th>Grade</th>
                <th>Marks</th>
                <th>Update</th>
            </tr>
            {% for student in students %}
            <tr>
                <td>{{ student.student_id }}</td>
                <td>{{ student.user.username }}</td>
                <td>{{ student.grade }}</td>
                <td>{{ student.marks }}</td>
                <td><a href="{% url 'update_marks' student.id %}">Update Marks</a></td>
            </tr>
            {% endfor %}
        </table>
    </div>
</body>
</html>
